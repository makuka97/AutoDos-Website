<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDOS - Operating Systems</title>
<style>
  :root {
    --bg-gray: #c0c0c0;
    --win-blue: #000080;
    --border-light: #ffffff;
    --border-dark: #808080;
    --btn-green: #00aa00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    font-family: 'Courier New', monospace; 
    background: #3a6ea5; /* Classic Windows Teal */
    padding: 40px 20px; 
    display: flex;
    justify-content: center;
  }

  .window {
    width: 100%;
    max-width: 900px;
    background: var(--bg-gray);
    border: 2px solid var(--border-light);
    box-shadow: 2px 2px 0px var(--border-dark), 4px 4px 0px #000;
  }

  .title-bar {
    background: var(--win-blue);
    color: white;
    padding: 4px 8px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 2px;
  }

  .hero { 
    text-align: center; 
    padding: 30px 10px;
    background: #808080; 
    border-bottom: 2px solid #000;
  }
  
  .hero img { 
    width: 180px; 
    image-rendering: pixelated; 
    display: block; /* Removes baseline gap */
    margin: 0 auto;
  }

  .grid { 
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    background: #000; 
    gap: 2px;
  }

  .col { 
    background: var(--bg-gray);
    display: flex;
    flex-direction: column;
  }

  .col-header { 
    background: #d4d0c8; 
    border-bottom: 2px solid #000; 
    padding: 10px 5px; 
    text-align: center; 
    font-weight: bold; 
    font-size: 11px;
  }

  .col-image { 
    background: #000; 
    line-height: 0; /* Tightens image container */
  }

  .col-image img { 
    width: 100%; 
    height: auto; 
    display: block; /* Crucial: removes the tiny white/gray gap under images */
    image-rendering: pixelated; 
  }

  .col-download { 
    padding: 15px 10px; 
    text-align: center; 
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 120px;
  }

  .col-note { 
    font-size: 10px; 
    color: #000; 
    margin-bottom: 12px;
    font-weight: bold;
  }

  .dl-btn { 
    font-family: monospace; 
    font-size: 12px; 
    font-weight: bold;
    background: var(--btn-green); 
    color: #fff; 
    border-top: 2px solid #00ff00;
    border-left: 2px solid #00ff00;
    border-right: 2px solid #005500;
    border-bottom: 2px solid #005500;
    padding: 8px 0; 
    cursor: pointer; 
    display: block; 
    text-decoration: none; 
  }

  .dl-btn:active { 
    border-top: 2px solid #005500;
    border-left: 2px solid #005500;
    border-right: 2px solid #00ff00;
    border-bottom: 2px solid #00ff00;
    transform: translate(1px, 1px);
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <span>AUTODOS_DISTRIBUTION_V1.0</span>
    <span>[X]</span>
  </div>

  <div class="hero">
    <img src="hero-logo.png" alt="AutoDOS">
  </div>

  <div class="grid">
    <div class="col">
      <div class="col-header">AutoDOS for Windows</div>
      <div class="col-image"><img src="win-dist.png" alt="Win"></div>
      <div class="col-download">
        <div class="col-note">Win 9x/XP/Later</div>
        <a href="AutoDos_Windows.zip" class="dl-btn" download>Download</a>
      </div>
    </div>

    <div class="col">
      <div class="col-header">AutoDOS for Linux</div>
      <div class="col-image"><img src="lin-dist.png" alt="Lin"></div>
      <div class="col-download">
        <div class="col-note">x86 / x64 Binaries</div>
        <a href="AutoDOS-Linux.zip" class="dl-btn" download>Download</a>
      </div>
    </div>

    <div class="col">
      <div class="col-header">AutoDOS for macOS</div>
      <div class="col-image"><img src="mac-dist.png" alt="Mac"></div>
      <div class="col-download">
        <div class="col-note">Universal Build</div>
        <a href="AutoDOS_mac.zip" class="dl-btn" download>Download</a>
      </div>
    </div>

    <div class="col">
      <div class="col-header">AutoDOS Legacy</div>
      <div class="col-image"><img src="legacy-dist.png" alt="Legacy"></div>
      <div class="col-download">
        <div class="col-note">For Windows XP and up</div>
        <a href="autodos_legacy.zip" class="dl-btn" download>Download</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
